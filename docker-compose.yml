services:
  mysql:
    image: mysql:8.0
    container_name: wordpress_mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: ahajari_wrdp1
      MYSQL_USER: ahajari_wrdp1
      MYSQL_PASSWORD: g6TmCBnybZn4BEEW
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  wordpress:
    image: php:7.4-apache
    container_name: wordpress_php
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8000:80"
    volumes:
      - .:/var/www/html
    environment:
      - MYSQL_HOST=mysql
      - MYSQL_DB=ahajari_wrdp1
      - MYSQL_USER=ahajari_wrdp1
      - MYSQL_PASSWORD=g6TmCBnybZn4BEEW

volumes:
  mysql_data:
